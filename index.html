<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUANTUM // Trading Desk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/styles.css">
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body class="bg-chart-bg text-gray-200 antialiased overflow-hidden h-screen flex flex-col">

    <header class="h-14 border-b border-chart-border flex items-center justify-between px-6 bg-zinc-950">
        <div class="flex items-center space-between gap-6">
            <span class="text-xs font-black tracking-widest text-emerald-500 uppercase">Quantum // Analytics</span>
            <div class="flex items-center bg-zinc-900 border border-chart-border rounded px-2 py-1">
                <input id="tickerInput" type="text" value="AAPL" class="bg-transparent text-sm font-semibold uppercase focus:outline-none w-16 text-center text-white">
                <button id="loadTicker" class="text-xs text-zinc-400 hover:text-white ml-1">➔</button>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <div class="flex items-center gap-2">
                <span class="h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></span>
                <span class="text-xs font-mono text-zinc-400" id="wsStatus">LIVE_PROXY_CONNECTED</span>
            </div>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <aside class="w-64 border-r border-chart-border bg-zinc-950 p-4 hidden md:block">
            <h3 class="text-xs font-semibold tracking-wider text-zinc-500 uppercase mb-3">Watchlist</h3>
            <div class="space-y-2">
                <div class="p-2 bg-zinc-900/50 border border-chart-border rounded flex justify-between items-center cursor-pointer hover:border-zinc-700">
                    <span class="text-sm font-medium">AAPL</span>
                    <span class="text-xs font-mono text-emerald-400">+1.24%</span>
                </div>
                <div class="p-2 bg-zinc-900/50 border border-chart-border rounded flex justify-between items-center cursor-pointer hover:border-zinc-700">
                    <span class="text-sm font-medium">TSLA</span>
                    <span class="text-xs font-mono text-rose-500">-2.41%</span>
                </div>
            </div>
        </aside>

        <section class="flex-1 flex flex-col bg-chart-bg relative">
            <div class="h-12 border-b border-chart-border flex items-center px-6 gap-6 text-xs font-mono text-zinc-400">
                <div>LAST: <span id="lastPrice" class="text-white font-bold">--</span></div>
                <div>BID: <span class="text-emerald-400">--</span></div>
                <div>ASK: <span class="text-rose-500">--</span></div>
            </div>
            
            <div id="chartWorkspace" class="flex-1 w-full p-4 relative">
                </div>
        </section>
    </main>

    <script src="/static/js/app.js"></script>
</body>
</html>
