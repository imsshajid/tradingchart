<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#09090b">
    <meta name="description" content="QUANTUM // TERMINAL elite multi-pane trading desk workspace.">
    <title>QUANTUM // TERMINAL</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <link rel="stylesheet" href="/css/workspace.css">
    <script src="/js/dashboard.js" defer></script>
</head>
<body class="h-[100dvh] overflow-hidden bg-[#09090b] text-zinc-100 antialiased">
    <div class="relative h-full min-h-0 overflow-hidden bg-[#09090b]">
        <header class="absolute inset-x-0 top-0 z-20 h-16 border-b border-[#1f1f23] bg-[#0c0c0e]/95 px-4 shadow-[0_1px_0_rgba(255,255,255,0.03)] backdrop-blur md:px-6">
            <nav class="mx-auto flex h-full w-full max-w-[1920px] items-center justify-between gap-4" aria-label="Trading desk workspace">
                <a href="/" class="min-w-0 shrink-0 font-mono text-sm font-semibold uppercase tracking-[0.28em] text-zinc-100">
                    QUANTUM // TERMINAL
                </a>

                <div class="flex min-w-0 items-center justify-end gap-3">
                    <label class="flex h-10 items-center gap-2 rounded border border-[#1f1f23] bg-[#09090b] px-3 shadow-[inset_0_1px_0_rgba(255,255,255,0.03)]">
                        <span class="hidden font-mono text-[11px] font-semibold uppercase tracking-[0.18em] text-zinc-500 sm:inline">Panels</span>
                        <select
                            id="layoutPicker"
                            name="panelCount"
                            class="h-7 rounded bg-[#0c0c0e] pl-2 pr-7 font-mono text-sm font-semibold text-zinc-100 outline-none"
                            aria-label="Panel count"
                        >
                            <option value="1">1 chart</option>
                            <option value="2">2 charts</option>
                            <option value="4">4 charts</option>
                            <option value="6">6 charts</option>
                            <option value="8">8 charts</option>
                        </select>
                    </label>

                    <div class="flex h-10 items-center gap-2 rounded border border-[#1f1f23] bg-[#09090b] px-3 shadow-[inset_0_1px_0_rgba(255,255,255,0.03)]" role="status" aria-live="polite">
                        <span class="relative flex h-2.5 w-2.5" aria-hidden="true">
                            <span class="absolute inset-0 rounded-full bg-emerald-400/20"></span>
                            <span class="relative h-2.5 w-2.5 rounded-full bg-emerald-400 shadow-[0_0_16px_rgba(16,185,129,0.8)]"></span>
                        </span>
                        <span data-stream-status-text class="max-w-[12rem] truncate font-mono text-[11px] font-semibold uppercase tracking-[0.18em] text-zinc-300">DATA_STREAM_CONNECTED</span>
                    </div>
                </div>
            </nav>
        </header>

        <main
            id="chartWorkspace"
            class="absolute inset-x-3 bottom-3 top-[76px] min-h-0 overflow-hidden rounded border border-[#1f1f23] bg-[#0c0c0e] shadow-[0_24px_80px_rgba(0,0,0,0.45),inset_0_1px_0_rgba(255,255,255,0.03)] md:inset-x-4 md:bottom-4"
            aria-label="Dynamic chart workspace"
        ></main>
    </div>
</body>
</html>
