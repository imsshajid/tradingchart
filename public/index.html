<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUANTUM // Netlify Trading Desk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/styles.css">
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body class="bg-[#09090b] text-gray-200 antialiased overflow-hidden h-screen flex flex-col">

    <header class="h-14 border-b border-[#1f1f23] flex items-center justify-between px-6 bg-zinc-950">
        <div class="flex items-center gap-6">
            <span class="text-xs font-black tracking-widest text-emerald-500 uppercase">Quantum // Netlify</span>
            <div class="flex items-center bg-zinc-900 border border-[#1f1f23] rounded px-2 py-1">
                <input id="tickerInput" type="text" value="AAPL" class="bg-transparent text-sm font-semibold uppercase focus:outline-none w-16 text-center text-white">
                <button id="loadTicker" class="text-xs text-zinc-400 hover:text-white ml-1">➔</button>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <span class="h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></span>
            <span class="text-xs font-mono text-zinc-400">POLLING_ACTIVE</span>
        </div>
    </header>

    <main class="flex-1 w-full p-4 relative" id="chartWorkspace">
        </main>

    <script src="/js/app.js"></script>
</body>
</html>
